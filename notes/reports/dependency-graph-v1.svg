<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="GeneaSketch dependency graph v1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ed" />
      <stop offset="100%" stop-color="#efe6d8" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#46535b" />
    </marker>
    <style>
      .title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #152026; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #33424b; }
      .node-title { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #122028; }
      .node-text { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #2f3f48; }
      .edge { stroke: #46535b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .edge-label { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #2f3f48; }
      .card { fill: #ffffff; stroke: #d7d0c4; stroke-width: 1.4; rx: 14; }
      .legend { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #2f3f48; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)" />

  <text x="60" y="64" class="title">GeneaSketch - Grafo de Dependencias (v1)</text>
  <text x="60" y="94" class="subtitle">Base: Versionado + Evidencia, con APIs co-dependiente y carriles Agente/Gamificación</text>

  <rect x="550" y="130" width="300" height="96" class="card" />
  <text x="570" y="165" class="node-title">N0002 - Versionado</text>
  <text x="570" y="190" class="node-text">Fundación principal</text>
  <text x="570" y="210" class="node-text">Local/import primero</text>

  <rect x="180" y="260" width="300" height="96" class="card" />
  <text x="200" y="295" class="node-title">N0001 - APIs</text>
  <text x="200" y="320" class="node-text">Integración externa de datos</text>
  <text x="200" y="340" class="node-text">No bloquea inicio local</text>

  <rect x="920" y="260" width="300" height="96" class="card" />
  <text x="940" y="295" class="node-title">N0003 - Evidencia</text>
  <text x="940" y="320" class="node-text">Provenance y rigor</text>
  <text x="940" y="340" class="node-text">Valida resultados</text>

  <rect x="180" y="460" width="300" height="96" class="card" />
  <text x="200" y="495" class="node-title">N0004 - Agente</text>
  <text x="200" y="520" class="node-text">Investigación autónoma</text>
  <text x="200" y="540" class="node-text">Depende de base + datos</text>

  <rect x="920" y="460" width="300" height="96" class="card" />
  <text x="940" y="495" class="node-title">N0006 - Gamificación</text>
  <text x="940" y="520" class="node-text">Validación humana</text>
  <text x="940" y="540" class="node-text">Carril comunidad</text>

  <rect x="550" y="650" width="300" height="96" class="card" />
  <text x="570" y="685" class="node-title">N0005 - Cápsulas</text>
  <text x="570" y="710" class="node-text">Producto emocional/legado</text>
  <text x="570" y="730" class="node-text">Dep. parcial de la base</text>

  <path d="M550 178 C505 178, 500 290, 480 308" class="edge" />
  <text x="500" y="235" class="edge-label">co-dep</text>
  <path d="M480 300 C530 292, 560 210, 560 178" class="edge" />
  <text x="515" y="270" class="edge-label">co-dep</text>

  <path d="M850 178 C920 190, 960 240, 980 260" class="edge" />
  <text x="900" y="212" class="edge-label">enables</text>
  <path d="M480 308 C650 360, 880 360, 920 308" class="edge" />
  <text x="690" y="376" class="edge-label">enables</text>

  <path d="M980 356 C920 430, 450 430, 400 460" class="edge" />
  <text x="655" y="418" class="edge-label">guards</text>
  <path d="M330 356 C300 420, 300 440, 320 460" class="edge" />
  <text x="265" y="410" class="edge-label">feeds</text>
  <path d="M640 226 C560 345, 450 430, 400 460" class="edge" />
  <text x="510" y="334" class="edge-label">supports</text>

  <path d="M980 356 C1040 420, 1070 440, 1080 460" class="edge" />
  <text x="1050" y="410" class="edge-label">supports</text>
  <path d="M760 226 C880 340, 1020 430, 1080 460" class="edge" />
  <text x="890" y="332" class="edge-label">supports</text>
  <path d="M420 356 C600 430, 900 430, 1020 460" class="edge" />
  <text x="705" y="450" class="edge-label">feeds</text>

  <path d="M1060 556 C990 625, 850 670, 850 690" class="edge" />
  <text x="930" y="630" class="edge-label">supports</text>
  <path d="M700 226 C700 300, 700 560, 700 650" class="edge" />
  <text x="712" y="440" class="edge-label">supports</text>
  <path d="M980 356 C940 470, 860 580, 760 650" class="edge" />
  <text x="878" y="520" class="edge-label">supports</text>

  <rect x="60" y="790" width="520" height="72" class="card" />
  <text x="80" y="820" class="legend">Leyenda</text>
  <text x="80" y="842" class="legend">co-dep: relación bidireccional no estricta | enables/supports/feeds/guards: dependencia funcional</text>
</svg>
