<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GeneaSketch Dependency Graph - Infographic</title>
    <style>
      :root {
        --bg-1: #f7f4ed;
        --bg-2: #efe6d8;
        --ink: #182126;
        --card: rgba(255, 255, 255, 0.9);
        --border: rgba(24, 33, 38, 0.15);
        --btn: #1f6f5f;
        --btn-hover: #18584b;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 10%, #fff4d6 0%, transparent 45%),
          radial-gradient(circle at 85% 85%, #d8efe8 0%, transparent 40%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .shell {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        padding: 12px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 10px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 12px;
      }

      .title {
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .button {
        border: 0;
        border-radius: 10px;
        padding: 8px 12px;
        background: var(--btn);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      .button:hover {
        background: var(--btn-hover);
      }

      #container {
        width: 100%;
        height: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.76);
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="toolbar">
        <div class="title">GeneaSketch - Grafo de Dependencias (v1)</div>
        <button id="export-svg" class="button" type="button">Exportar SVG</button>
      </div>
      <div id="container"></div>
    </div>

    <script src="https://unpkg.com/@antv/infographic@latest/dist/infographic.min.js"></script>
    <script>
      const syntax = String.raw`infographic relation-dagre-flow-tb-badge-card
data
  title GeneaSketch Dependency Graph
  desc Foundation and capability dependencies from notes N0001-N0006
  nodes
    - id N0002
      label N0002 Versioning
      desc Core foundation; local/import path first
      icon source branch
    - id N0001
      label N0001 APIs
      desc External data integration lane
      icon cloud
    - id N0003
      label N0003 Evidence
      desc Provenance and strict reasoning
      icon shield check
    - id N0004
      label N0004 Agent
      desc Autonomous research capability
      icon robot
    - id N0006
      label N0006 Gamification
      desc Human validation and engagement lane
      icon gamepad
    - id N0005
      label N0005 Capsules
      desc Legacy and emotional product lane
      icon archive
  relations
    N0002 - co-dep -> N0001
    N0001 - co-dep -> N0002
    N0001 - enables -> N0003
    N0002 - enables -> N0003
    N0003 - guards -> N0004
    N0001 - feeds -> N0004
    N0002 - supports -> N0004
    N0003 - supports -> N0006
    N0002 - supports -> N0006
    N0001 - feeds -> N0006
    N0006 - supports -> N0005
    N0002 - supports -> N0005
    N0003 - supports -> N0005`;

      const infographic = new AntVInfographic.Infographic({
        container: "#container",
        width: "100%",
        height: "100%",
      });

      function render() {
        try {
          infographic.render(syntax);
        } catch (error) {
          console.error("Render error:", error);
        }
      }

      render();
      document.fonts
        ?.ready.then(render)
        .catch((error) => console.error("Font readiness error:", error));

      async function exportSvg() {
        try {
          const svgDataUrl = await infographic.toDataURL({ type: "svg" });
          const a = document.createElement("a");
          a.href = svgDataUrl;
          a.download = "geneasketch-dependency-graph-v1.svg";
          a.click();
        } catch (error) {
          console.error("SVG export error:", error);
          alert("No se pudo exportar SVG. Revisa la consola.");
        }
      }

      document.getElementById("export-svg").addEventListener("click", exportSvg);
    </script>
  </body>
</html>
